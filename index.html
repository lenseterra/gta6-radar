<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA 6 Radar — Mapa, Guías y Leaks de Leonida</title>
<meta name="description" content="GTA 6 Radar: el centro de seguimiento de GTA VI. Fecha de lanzamiento, mapa de Leonida, guías y leaks.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --void: #08060c;
    --void-soft: #100b18;
    --panel: #150f20;
    --line: #2e2244;
    --line-bright: #4a3568;
    --chrome: #f1edfb;
    --chrome-dim: #b3a9cc;
    --magenta: #ff2d78;
    --cyan: #1de9d8;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--void);
    color: var(--chrome);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  .hero{
    position: relative;
    min-height: 88vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }

  .hero-banner{
    width: 100%;
    height: 460px;
    object-fit: cover;
    object-position: center 30%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }

  .hero-overlay{
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, var(--void) 88%);
    z-index: 1;
  }

  .hero-content{
    position: relative;
    z-index: 2;
    padding: 0 22px 60px;
    max-width: 1180px;
    margin: 0 auto;
  }

  h1.wordmark{
    font-family: 'Teko', sans-serif;
    font-weight: 700;
    font-size: clamp(72px, 14vw, 180px);
    line-height: 0.85;
    text-transform: uppercase;
    color: var(--chrome);
    text-shadow: 0 0 30px rgba(255,45,120,0.5);
  }
  h1.wordmark .accent{
    color: var(--cyan);
  }

  .hero-tagline{
    font-size: 15.5px;
    color: var(--chrome-dim);
    max-width: 580px;
    margin-top: 12px;
  }

  /* Espacio para Ads */
  .ad-space{
    max-width: 1180px;
    margin: 50px auto;
    padding: 0 22px;
  }
  .ad-placeholder{
    background: var(--panel);
    border: 2px dashed var(--line-bright);
    border-radius: 12px;
    padding: 35px 20px;
    text-align: center;
    color: #6b6088;
  }
</style>
</head>
<body>

  <!-- HERO CON BANNER -->
  <section class="hero">
    <!-- Cambia TU-USUARIO por tu usuario real de GitHub -->
    <img src="https://raw.githubusercontent.com/lenseterra/gta6-radar/main/image.png" 
         alt="GTA 6 Radar Banner" 
         class="hero-banner"
         onerror="this.src='https://via.placeholder.com/1920x460/1a1228/ffffff?text=GTA+6+RADAR';">
    
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1 class="wordmark">GTA 6 <span class="accent">RADAR</span></h1>
      <p class="hero-tagline">Tu centro de seguimiento para Grand Theft Auto VI • Mapa • Guías • Leaks</p>
    </div>
  </section>

  <!-- ESPACIO PARA ANUNCIOS (AdSense) -->
  <div class="ad-space">
    <div class="ad-placeholder">
      <strong>📍 ESPACIO PUBLICITARIO</strong><br><br>
      <!-- Pega aquí tu código de Google AdSense -->
      <!-- Ejemplo: <ins class="adsbygoogle" ...></ins> -->
    </div>
  </div>

  <!-- CONTENIDO PRINCIPAL (puedes expandir después) -->
  <main style="max-width:1180px; margin:0 auto; padding:0 22px 80px;">
    <h2 style="color:#ff2d78; margin-bottom:20px;">🚧 Sitio en construcción</h2>
    <p>Próximamente: Mapa interactivo de Leonida, guías, timeline y leaks verificados.</p>
  </main>

</body>
</html>
