<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA 6 Radar — Mapa, Guías y Leaks de Leonida</title>
<meta name="description" content="GTA 6 Radar: el centro de seguimiento de GTA VI. Fecha de lanzamiento, mapa de Leonida, guías de actividades y leaks verificados.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --void: #08060c;
    --void-soft: #100b18;
    --panel: #150f20;
    --panel-2: #1a1228;
    --line: #2e2244;
    --line-bright: #4a3568;
    --chrome: #f1edfb;
    --chrome-dim: #b3a9cc;
    --chrome-faint: #6b6088;
    --magenta: #ff2d78;
    --magenta-soft: #ff6fa8;
    --cyan: #1de9d8;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--void);
    color: var(--chrome);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    line-height: 1.55;
  }

  .hero{
    position: relative;
    min-height: 88vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }

  .hero-banner{
    width: 100%;
    height: 420px;
    object-fit: cover;
    object-position: center 35%;
  }

  .hero-overlay{
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 55%, var(--void) 85%);
  }

  .hero-content{
    position: relative;
    z-index: 2;
    padding: 28px 22px 60px;
    max-width: 1180px;
    margin: 0 auto;
  }

  h1.wordmark{
    font-family: 'Teko', sans-serif;
    font-weight: 700;
    font-size: clamp(64px, 13vw, 168px);
    line-height: 0.82;
    text-transform: uppercase;
    color: var(--chrome);
    text-shadow: 0 0 22px rgba(255,45,120,0.4);
  }
  h1.wordmark .accent{
    color: var(--cyan);
  }

  .hero-tagline{
    font-size: 15px;
    color: #b3a9cc;
    max-width: 560px;
    margin-top: 16px;
  }

  /* Espacio para Ads */
  .ad-space{
    max-width: 1180px;
    margin: 40px auto;
    padding: 0 22px;
  }
  .ad-placeholder{
    background: var(--panel);
    border: 2px dashed #4a3568;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    color: #6b6088;
    font-size: 14px;
  }
</style>
</head>
<body>

  <!-- HERO CON BANNER -->
  <section class="hero">
    <img src="image.png" alt="GTA 6 Radar Banner" class="hero-banner">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <h1 class="wordmark">GTA 6 <span class="accent">RADAR</span></h1>
      <p class="hero-tagline">Tu centro de seguimiento oficial y leaks de Grand Theft Auto VI</p>
    </div>
  </section>

  <!-- ESPACIO PARA ANUNCIOS -->
  <div class="ad-space">
    <div class="ad-placeholder">
      <!-- === PEGA AQUÍ TU CÓDIGO DE GOOGLE ADSENSE === -->
      <p>Espacio para anuncio (728×90 o 970×250)</p>
    </div>
  </div>

  <!-- El resto de tu contenido va aquí -->
  <main style="max-width:1180px; margin:0 auto; padding:0 22px;">
    <h2 style="color:#ff2d78;">Contenido en desarrollo...</h2>
    <p>Aquí puedes agregar tus secciones de mapa, guías, leaks, etc.</p>
  </main>

</body>
</html>
