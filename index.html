<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA 6 Radar — Mapa, Guías y Leaks de Leonida</title>
<meta name="description" content="GTA 6 Radar: el centro de seguimiento de GTA VI. Fecha de lanzamiento, mapa de Leonida, guías de actividades y leaks verificados, todo en un solo lugar.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --void: #08060c;
    --void-soft: #100b18;
    --panel: #150f20;
    --panel-2: #1a1228;
    --line: #2e2244;
    --line-bright: #4a3568;
    --chrome: #f1edfb;
    --chrome-dim: #b3a9cc;
    --chrome-faint: #6b6088;
    --magenta: #ff2d78;
    --magenta-soft: #ff6fa8;
    --orange: #ff7a3d;
    --purple: #8b3df0;
    --cyan: #1de9d8;
    --cyan-dim: #0d5a52;
    --amber: #ffc145;
    --green: #3df08c;
    --red: #ff4d6a;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{ scroll-behavior:smooth; }

  body{
    background: var(--void);
    color: var(--chrome);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    line-height: 1.55;
    overflow-x: hidden;
  }

  .mono{ font-family:'JetBrains Mono', monospace; }

  ::selection{ background: var(--magenta); color: var(--void); }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-track{ background: var(--void-soft); }
  ::-webkit-scrollbar-thumb{ background: var(--line-bright); border-radius:5px; }

  a{ color: inherit; }
  button{ font-family: inherit; }

  :focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }

  .wrap{ max-width: 1180px; margin: 0 auto; padding: 0 22px; }

  /* ================= SCANLINE OVERLAY ================= */
  .scanlines{
    position: fixed; inset:0; pointer-events:none; z-index: 999;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.018) 0px,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
    opacity: 0.6;
  }

  /* ================= HERO ================= */
  .hero{
    position: relative;
    min-height: 88vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }

  .hero-banner{
    width: 100%;
    height: 420px;
    object-fit: cover;
    object-position: center 35%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
  }

  .hero-overlay{
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 60%, var(--void) 85%);
    z-index: 1;
  }

  .hero-content{
    position: relative;
    z-index: 2;
    padding: 28px 22px 46px;
  }
  .hero-inner{ max-width: 1180px; margin: 0 auto; }

  .topline{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--chrome-faint);
    padding-bottom: clamp(40px, 14vh, 130px);
    flex-wrap: wrap;
    gap: 12px;
  }

  .lang-toggle{
    position: relative;
    display: inline-flex; align-items:center;
    width: 60px; height: 26px;
    background: var(--panel-2);
    border: 1px solid var(--line-bright);
    border-radius: 999px;
    cursor: pointer;
    padding: 0;
    font-family:'JetBrains Mono', monospace;
  }
  .lang-toggle .lang-opt{
    flex:1; text-align:center; font-size: 9px; letter-spacing:0.05em;
    color: var(--chrome-faint); z-index:2; transition: color 0.2s ease;
    pointer-events:none;
  }
  .lang-toggle .lang-thumb{
    position:absolute; top:2px; left:2px; width:28px; height:20px;
    background: linear-gradient(135deg, var(--magenta), var(--cyan));
    border-radius: 999px;
    box-shadow: 0 0 10px rgba(255,45,120,0.5);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  }
  .lang-toggle[data-active="en"] .lang-thumb{ transform: translateX(30px); }
  .lang-toggle[data-active="es"] .lang-opt[data-lang-opt="es"]{ color:#fff; font-weight:700; }
  .lang-toggle[data-active="en"] .lang-opt[data-lang-opt="en"]{ color:#fff; font-weight:700; }

  .topline .live{ display:flex; align-items:center; gap:7px; color: var(--cyan); }
  .dot-live{
    width:6px; height:6px; border-radius:50%; background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: blink 1.6s infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  h1.wordmark{
    font-family: 'Teko', sans-serif;
    font-weight: 700;
    font-size: clamp(64px, 13vw, 168px);
    line-height: 0.82;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: var(--chrome);
    -webkit-text-stroke: 1px rgba(255,255,255,0.1);
    text-shadow:
      0 0 2px rgba(255,255,255,0.3),
      0 0 22px rgba(255,45,120,0.32),
      0 2px 40px rgba(0,0,0,0.6);
  }
  h1.wordmark .accent{
    background: linear-gradient(180deg, var(--cyan) 0%, #0d9c8f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    -webkit-text-stroke: 0;
    text-shadow: 0 0 30px rgba(29,233,216,0.6);
  }
  h1.wordmark .slash{
    color: var(--magenta);
    -webkit-text-stroke:0;
    font-size: 0.55em;
    opacity:0.8;
    margin: 0 4px;
    vertical-align: middle;
  }

  .hero-tagline{
    font-size: 14.5px;
    color: var(--chrome-dim);
    max-width: 540px;
    margin-top: 14px;
  }
  .hero-tagline b{ color: var(--chrome); font-weight:600; }

  /* ================= RADAR NAV ================= */
  .radar-nav{
    position: sticky; top:0; z-index: 50;
    background: rgba(8,6,12,0.86);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .radar-nav-inner{
    max-width:1180px; margin:0 auto; padding: 0 22px;
    display:flex; align-items:center; gap: 4px;
    overflow-x:auto;
  }
  .blip-btn{
    position:relative;
    display:flex; align-items:center; gap:8px;
    background:transparent; border:none; cursor:pointer;
    color: var(--chrome-faint);
    font-weight:600; font-size: 13px;
    padding: 16px 16px;
    white-space:nowrap;
    transition: color 0.15s ease;
  }
  .blip-btn .blip-dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--chrome-faint);
    transition: all 0.2s ease;
  }
  .blip-btn:hover{ color: var(--chrome-dim); }
  .blip-btn.active{ color: var(--chrome); }
  .blip-btn.active .blip-dot{
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan), 0 0 16px rgba(29,233,216,0.5);
  }
  .blip-btn.active::after{
    content:""; position:absolute; left:16px; right:16px; bottom:0; height:2px;
    background: linear-gradient(90deg, var(--magenta), var(--cyan));
    box-shadow: 0 0 8px var(--cyan);
  }

  /* ================= MAIN ================= */
  main{ padding-top: 44px; padding-bottom: 90px; }
  .panel-section{ display:none; }
  .panel-section.active{ display:block; animation: fadein 0.3s ease; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ================= EL RESTO DE TUS ESTILOS ORIGINALES ================= */
  .section-eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing:0.14em; text-transform:uppercase;
    color: var(--cyan);
    margin-bottom: 10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-eyebrow::before{ content:"//"; color: var(--magenta); }

  .section-title{
    font-family:'Teko', sans-serif; font-weight:700;
    font-size: clamp(34px, 5vw, 50px);
    letter-spacing:0.01em; text-transform:uppercase;
    line-height: 0.95;
    color: var(--chrome);
    margin-bottom: 8px;
  }
  .section-desc{
    font-size: 13.5px; color: var(--chrome-dim); max-width: 640px; margin-bottom: 28px;
  }

  .banner{
    display:flex; align-items:flex-start; gap: 13px;
    border-radius: 10px;
    padding: 16px 18px;
    font-size: 12.5px;
    margin-bottom: 30px;
    line-height: 1.6;
  }
  .banner-official{
    background: linear-gradient(135deg, rgba(61,240,140,0.07), rgba(61,240,140,0.02));
    border: 1px solid rgba(61,240,140,0.28);
    color: #c9f7da;
  }
  .banner-leak{
    background: repeating-linear-gradient(135deg, rgba(255,193,69,0.08), rgba(255,193,69,0.08) 12px, rgba(255,193,69,0.02) 12px, rgba(255,193,69,0.02) 24px);
    border: 1px solid rgba(255,193,69,0.35);
    color: #ffe7b8;
  }
  .banner-icon{ font-size: 17px; line-height:1; margin-top:1px; flex-shrink:0; }
  .banner b{ color: var(--chrome); }

  /* ... (todos los demás estilos que tenías en tu archivo original se mantienen) ... */
  /* Por brevedad en este mensaje no los repito todos, pero en tu versión final inclúyelos completos */

  footer{
    text-align:center; padding: 34px 20px 16px; font-size: 11px; color: var(--chrome-faint);
    font-family:'JetBrains Mono', monospace; border-top: 1px solid var(--line); margin-top: 20px;
  }
</style>
</head>
<body>

  <!-- HERO CON BANNER -->
  <section class="hero">
    <img src="image.png" alt="GTA 6 Radar" class="hero-banner">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="hero-inner">
        <div class="topline">
          <div>LEONIDA STATE · SEGUIMIENTO NO OFICIAL</div>
          <div class="live"><span class="dot-live"></span> EN VIVO</div>
          <div class="lang-toggle" id="langToggle" data-active="es">
            <span class="lang-opt" data-lang-opt="es">ES</span>
            <span class="lang-opt" data-lang-opt="en">EN</span>
            <span class="lang-thumb"></span>
          </div>
        </div>

        <h1 class="wordmark">
          GTA 6 <span class="slash">/</span> <span class="accent">RADAR</span>
        </h1>

        <p class="hero-tagline" data-i18n="hero_tagline">
          Tu centro de señal para <b>Grand Theft Auto VI</b>: lo confirmado por Rockstar, el mapa de Leonida, guías de actividades y todo lo que la comunidad ha rastreado.
        </p>
      </div>
    </div>
  </section>

  <!-- El resto de tu contenido original (radar-nav, main, footer, scripts) -->
  <!-- Copia aquí todo el contenido que tenías después del hero en tu archivo original -->

  <div class="scanlines"></div>

  <!-- Scripts (mantén todos los que tenías) -->
  <script>
    // Tus scripts originales aquí...
  </script>

</body>
</html>
