<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA 6 Radar — Mapa, Guías y Leaks de Leonida</title>
<meta name="description" content="GTA 6 Radar: el centro de seguimiento de GTA VI. Fecha de lanzamiento, mapa de Leonida, guías de actividades y leaks verificados, todo en un solo lugar.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --void: #08060c;
    --void-soft: #100b18;
    --panel: #150f20;
    --panel-2: #1a1228;
    --line: #2e2244;
    --line-bright: #4a3568;
    --chrome: #f1edfb;
    --chrome-dim: #b3a9cc;
    --chrome-faint: #6b6088;
    --magenta: #ff2d78;
    --magenta-soft: #ff6fa8;
    --orange: #ff7a3d;
    --purple: #8b3df0;
    --cyan: #1de9d8;
    --cyan-dim: #0d5a52;
    --amber: #ffc145;
    --green: #3df08c;
    --red: #ff4d6a;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{ scroll-behavior:smooth; }

  body{
    background: var(--void);
    color: var(--chrome);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    line-height: 1.55;
    overflow-x: hidden;
  }

  .mono{ font-family:'JetBrains Mono', monospace; }

  .hero{
    position: relative;
    min-height: 88vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }

  .hero-banner{
    width: 100%;
    height: 460px;
    object-fit: cover;
    object-position: center 35%;
  }

  .hero-overlay{
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 55%, var(--void) 88%);
    z-index: 1;
  }

  .hero-content{
    position: relative;
    z-index: 2;
    padding: 28px 22px 46px;
  }
  .hero-inner{ max-width: 1180px; margin: 0 auto; }

  /* ================= RESTO DE ESTILOS ORIGINALES (completo) ================= */
  .topline{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--chrome-faint);
    padding-bottom: clamp(40px, 14vh, 130px);
    flex-wrap: wrap;
    gap: 12px;
  }

  .lang-toggle{
    position: relative;
    display: inline-flex; align-items:center;
    width: 60px; height: 26px;
    background: var(--panel-2);
    border: 1px solid var(--line-bright);
    border-radius: 999px;
    cursor: pointer;
    padding: 0;
    font-family:'JetBrains Mono', monospace;
  }
  .lang-toggle .lang-opt{
    flex:1; text-align:center; font-size: 9px; letter-spacing:0.05em;
    color: var(--chrome-faint); z-index:2; transition: color 0.2s ease;
    pointer-events:none;
  }
  .lang-toggle .lang-thumb{
    position:absolute; top:2px; left:2px; width:28px; height:20px;
    background: linear-gradient(135deg, var(--magenta), var(--cyan));
    border-radius: 999px;
    box-shadow: 0 0 10px rgba(255,45,120,0.5);
    transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  }
  .lang-toggle[data-active="en"] .lang-thumb{ transform: translateX(30px); }
  .lang-toggle[data-active="es"] .lang-opt[data-lang-opt="es"]{ color:#fff; font-weight:700; }
  .lang-toggle[data-active="en"] .lang-opt[data-lang-opt="en"]{ color:#fff; font-weight:700; }

  .topline .live{ display:flex; align-items:center; gap:7px; color: var(--cyan); }
  .dot-live{
    width:6px; height:6px; border-radius:50%; background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: blink 1.6s infinite;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  h1.wordmark{
    font-family: 'Teko', sans-serif;
    font-weight: 700;
    font-size: clamp(64px, 13vw, 168px);
    line-height: 0.82;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    color: var(--chrome);
    -webkit-text-stroke: 1px rgba(255,255,255,0.1);
    text-shadow: 0 0 2px rgba(255,255,255,0.3), 0 0 22px rgba(255,45,120,0.32), 0 2px 40px rgba(0,0,0,0.6);
  }
  h1.wordmark .accent{
    background: linear-gradient(180deg, var(--cyan) 0%, #0d9c8f 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    -webkit-text-stroke: 0;
    text-shadow: 0 0 30px rgba(29,233,216,0.6);
  }
  h1.wordmark .slash{
    color: var(--magenta);
    -webkit-text-stroke:0;
    font-size: 0.55em;
    opacity:0.8;
    margin: 0 4px;
    vertical-align: middle;
  }

  .hero-tagline{
    font-size: 14.5px;
    color: var(--chrome-dim);
    max-width: 540px;
    margin-top: 14px;
  }
  .hero-tagline b{ color: var(--chrome); font-weight:600; }

  /* Agrega aquí el resto de tus estilos originales si quieres más secciones */
</style>
</head>
<body>

  <!-- HERO CON BANNER -->
  <div class="hero">
    <img src="https://raw.githubusercontent.com/lenseterra/gta6-radar/main/GTArada.jpg" 
         alt="GTA 6 Radar Banner" 
         class="hero-banner">

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="hero-inner">
        <div class="topline">
          <span>LEONIDA STATE · SEGUIMIENTO NO OFICIAL</span>
          <div class="live"><span class="dot-live"></span> EN VIVO</div>
        </div>

        <h1 class="wordmark">GTA 6 <span class="slash">//</span> <span class="accent">RADAR</span></h1>
        <p class="hero-tagline">Tu centro de seguimiento para Grand Theft Auto VI</p>
      </div>
    </div>
  </div>

  <main style="padding:40px 22px; max-width:1180px; margin:0 auto;">
    <h2 style="color:#ff2d78;">Contenido completo cargado correctamente</h2>
    <p>Si ves este texto, el HTML está funcionando. Ahora puedes agregar el resto de secciones (mapa, leaks, etc.).</p>
  </main>

</body>
</html>
