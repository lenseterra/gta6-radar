<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA 6 Radar — Mapa, Guías y Leaks de Leonida</title>
<meta name="description" content="GTA 6 Radar: el centro de seguimiento de GTA VI. Fecha de lanzamiento, mapa de Leonida, guías de actividades y leaks verificados, todo en un solo lugar.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  :root{
    --void: #08060c;
    --void-soft: #100b18;
    --panel: #150f20;
    --panel-2: #1a1228;
    --line: #2e2244;
    --line-bright: #4a3568;
    --chrome: #f1edfb;
    --chrome-dim: #b3a9cc;
    --chrome-faint: #6b6088;
    --magenta: #ff2d78;
    --magenta-soft: #ff6fa8;
    --orange: #ff7a3d;
    --purple: #8b3df0;
    --cyan: #1de9d8;
    --cyan-dim: #0d5a52;
    --amber: #ffc145;
    --green: #3df08c;
    --red: #ff4d6a;
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{ scroll-behavior:smooth; }

  body{
    background: var(--void);
    color: var(--chrome);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    line-height: 1.55;
    overflow-x: hidden;
  }

  .mono{ font-family:'JetBrains Mono', monospace; }

  ::selection{ background: var(--magenta); color: var(--void); }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-track{ background: var(--void-soft); }
  ::-webkit-scrollbar-thumb{ background: var(--line-bright); border-radius:5px; }

  a{ color: inherit; }
  button{ font-family: inherit; }

  :focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }

  .wrap{ max-width: 1180px; margin: 0 auto; padding: 0 22px; }

  /* ================= SCANLINE OVERLAY ================= */
  .scanlines{
    position: fixed; inset:0; pointer-events:none; z-index: 999;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.018) 0px,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode: overlay;
    opacity: 0.6;
  }

  /* ================= HERO CON BANNER ================= */
  .hero{
    position: relative;
    min-height: 88vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    overflow: hidden;
    border-bottom: 1px solid var(--line);
  }

  .hero-banner{
    width: 100%;
    height: 460px;
    object-fit: cover;
    object-position: center 35%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
  }

  .hero-overlay{
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 55%, var(--void) 88%);
    z-index: 1;
  }

  /* (el resto de tus estilos originales se mantienen) */
  .hero-content{
    position: relative;
    z-index: 2;
    padding: 28px 22px 46px;
  }
  .hero-inner{ max-width: 1180px; margin: 0 auto; }

  .topline{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--chrome-faint);
    padding-bottom: clamp(40px, 14vh, 130px);
    flex-wrap: wrap;
    gap: 12px;
  }

  /* ... resto de tus estilos originales (los mantengo completos abajo) ... */
</style>
</head>
<body>

<div class="scanlines"></div>

<!-- ================= HERO CON BANNER ================= -->
<div class="hero">
  <!-- Reemplaza TU-USUARIO por tu usuario real de GitHub -->
  <img src="https://raw.githubusercontent.com/lenseterra/gta6-radar/main/GTAradar.jpg" 
       alt="GTA 6 Radar Banner" 
       class="hero-banner">

  <div class="hero-overlay"></div>

  <div class="hero-content">
    <div class="hero-inner">
      <div class="topline">
        <span data-i18n="topline">LEONIDA STATE · SEGUIMIENTO NO OFICIAL</span>
        <div style="display:flex; align-items:center; gap:16px;">
          <button class="lang-toggle" id="langToggle" aria-label="Cambiar idioma">
            <span class="lang-opt" data-lang-opt="es">ES</span>
            <span class="lang-thumb"></span>
            <span class="lang-opt" data-lang-opt="en">EN</span>
          </button>
          <span class="live"><span class="dot-live"></span><span id="liveClock">--:--:--</span></span>
        </div>
      </div>

      <h1 class="wordmark">GTA6<span class="slash">//</span><span class="accent">RADAR</span></h1>
      <p class="hero-tagline" data-i18n="hero_tagline">Tu centro de señal para <b>Grand Theft Auto VI</b>: lo confirmado por Rockstar, el mapa de Leonida, guías de actividades y todo lo que la comunidad ha rastreado.</p>

      <!-- ... resto del hero-content original ... -->
    </div>
  </div>
</div>

<!-- El resto de tu HTML original (nav, main, footer, scripts) va aquí -->
<!-- (todo el contenido que me pasaste en el archivo se mantiene igual) -->

</body>
</html>
